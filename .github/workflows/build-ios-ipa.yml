# Free IPA build for SideStore / AltStore (no Mac, no $99 Apple Developer).
# Uses GitHub's macOS runners. SideStore re-signs with your free Apple ID.
name: Build iOS IPA (unsigned)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - ".github/workflows/build-ios-ipa.yml"
      - "App.tsx"
      - "app.json"
      - "package.json"
      - "package-lock.json"
      - "src/**"

jobs:
  build-ipa:
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Patch ExpoModulesJSI for Xcode 26 Swift
        run: |
          set -euo pipefail
          FILE="node_modules/expo-modules-jsi/apple/Sources/ExpoModulesJSI/Coding/JavaScriptCodable+Date.swift"
          if [ -f "$FILE" ]; then
            sed -i.bak 's/abs(milliseconds) <= maxJavaScriptDateMilliseconds/Swift.abs(milliseconds) <= maxJavaScriptDateMilliseconds/' "$FILE"
            rg -n "Swift\.abs\(milliseconds\)|abs\(milliseconds\)" "$FILE" || true
          else
            echo "No Date.swift to patch (ok)"
          fi

      - name: Generate native iOS project
        run: npx expo prebuild --platform ios --non-interactive

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - name: Build Release (unsigned / for SideStore re-sign)
        run: |
          set -euo pipefail
          mkdir -p build
          WORKSPACE="ios/PulseTodo.xcworkspace"
          SCHEME="PulseTodo"
          xcodebuild -list -workspace "$WORKSPACE"
          # Prefer the app scheme explicitly (never pick Pod helper schemes).
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package IPA
        run: |
          set -euo pipefail
          APP=$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name "*.app" | head -n1)
          if [ -z "$APP" ]; then
            echo "No .app found. Build products:"
            find build/DerivedData/Build/Products -type d -maxdepth 3 || true
            exit 1
          fi
          echo "Packaging $APP"
          rm -rf Payload PulseTodo.ipa
          mkdir Payload
          cp -R "$APP" Payload/
          zip -qr PulseTodo.ipa Payload
          ls -lh PulseTodo.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PulseTodo-ipa
          path: PulseTodo.ipa
          if-no-files-found: error
          retention-days: 14
